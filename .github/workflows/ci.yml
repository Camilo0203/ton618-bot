name: ton618-bot-ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security Audit (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high

      - name: Check for outdated dependencies
        run: npm outdated || true

      - name: Validate squarecloud.config
        run: |
          echo "Checking squarecloud.config..."
          grep -q "^MAIN=" squarecloud.config || (echo "ERROR: MAIN missing" && exit 1)
          grep -q "^PORT=80" squarecloud.config || (echo "ERROR: PORT must be 80 for Square Cloud" && exit 1)
          grep -q "^HEALTHCHECK_PATH=" squarecloud.config || (echo "WARN: HEALTHCHECK_PATH not set")
          echo "squarecloud.config OK"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate environment example
        run: npm run env:check -- --file=.env.example

      - name: Validate production environment example
        run: npm run env:check -- --file=.env.production.example --mode=production

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate build fingerprint
        run: npm run build:fingerprint

      - name: Verify command loading
        run: node -e "require('./src/utils/commandLoader').loadAndValidateCommands('./src/commands')"

      - name: Verify health server module loads
        run: node -e "require('./src/utils/healthServer'); console.log('healthServer OK')"

      - name: Verify env validation module loads
        run: node -e "const {validateEnv}=require('./src/utils/env'); const r=validateEnv({DISCORD_TOKEN:'x'.repeat(60),MONGO_URI:'mongodb+srv://x:y@host/db',NODE_ENV:'development'}); console.log('warnings:',r.warnings.length,'errors:',r.errors.length)"

  production-gate:
    name: Production Readiness Gate
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production readiness audit
        run: npm run audit:readiness
        continue-on-error: false

      - name: Validate production env example is complete
        run: npm run env:check -- --file=.env.production.example --mode=production

      - name: Check no secrets committed
        run: |
          echo "Scanning for potential secret leaks..."
          ! grep -rn "sk_live_\|sq_\|xoxb-\|ghp_\|AKIA" --include="*.js" --include="*.json" --exclude-dir=node_modules . || \
            (echo "ERROR: Potential secret found in source!" && exit 1)
          echo "No secrets found in source."
