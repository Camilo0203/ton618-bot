name: Release

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Modo de despliegue de comandos"
        required: true
        default: "compact"
        type: choice
        options:
          - compact
          - full

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: git ls-files "*.js" | xargs -r -n 1 node --check

      - name: Run tests
        run: npm test

  deploy_staging:
    name: Deploy Staging
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    concurrency:
      group: release-staging
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke check command loader
        run: node -e "const path=require('path');const {loadAndValidateCommands}=require(path.join(process.cwd(),'src/utils/commandLoader'));const {commands,validationErrors}=loadAndValidateCommands(path.join(process.cwd(),'src/commands'));if(validationErrors.length){console.error(validationErrors.join('\n'));process.exit(1);}console.log('Commands validated:',commands.length);"

      - name: Deploy slash commands (staging, safe rollback)
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
          GUILD_ID: ${{ secrets.STAGING_GUILD_ID }}
          DEPLOY_MODE: ${{ github.event.inputs.deploy_mode }}
        run: |
          if [ -z "$DISCORD_TOKEN" ] || [ -z "$MONGO_URI" ] || [ -z "$GUILD_ID" ]; then
            echo "Missing DISCORD_TOKEN, MONGO_URI or STAGING_GUILD_ID. Skipping staging deployment."
            exit 0
          fi
          DEPLOY_ARGS="--min-smoke=5 --snapshot=tmp/deploy-staging-snapshot.json"
          if [ "$DEPLOY_MODE" = "compact" ]; then
            DEPLOY_ARGS="$DEPLOY_ARGS --compact"
          fi
          node scripts/deploy-with-rollback.js $DEPLOY_ARGS

  deploy_production:
    name: Deploy Production
    needs: deploy_staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    concurrency:
      group: release-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy slash commands (production, safe rollback)
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
          GUILD_ID: ${{ secrets.PRODUCTION_GUILD_ID }}
          DEPLOY_MODE: ${{ github.event.inputs.deploy_mode }}
        run: |
          if [ -z "$DISCORD_TOKEN" ] || [ -z "$MONGO_URI" ]; then
            echo "Missing DISCORD_TOKEN or MONGO_URI. Skipping production deployment."
            exit 0
          fi
          DEPLOY_ARGS="--min-smoke=8 --snapshot=tmp/deploy-production-snapshot.json"
          if [ "$DEPLOY_MODE" = "compact" ]; then
            DEPLOY_ARGS="$DEPLOY_ARGS --compact"
          fi
          node scripts/deploy-with-rollback.js $DEPLOY_ARGS
